<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Lift Log</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --surface2: #F0EEE9;
    --border: #E4E1D9;
    --text: #1C1B18;
    --text-muted: #8A8680;
    --accent: #6B8F71;
    --accent-light: #EAF0EB;
    --accent2: #8B7355;
    --accent2-light: #F2EDE6;
    --danger: #C0392B;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 4px 24px rgba(0,0,0,0.10);
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .app-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .app-title span {
    color: var(--accent);
  }

  .session-date {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* TAB SWITCHER */
  .tabs {
    display: flex;
    gap: 8px;
    padding: 14px 20px 0;
    background: var(--surface);
  }

  .tab {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface2);
    color: var(--text-muted);
  }

  .tab.active-upper {
    background: var(--accent-light);
    color: var(--accent);
  }

  .tab.active-lower {
    background: var(--accent2-light);
    color: var(--accent2);
  }

  /* MAIN CONTENT */
  .content {
    padding: 16px 16px 0;
  }

  /* EXERCISE CARD */
  .exercise-card {
    background: var(--surface);
    border-radius: var(--radius);
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
  }

  .exercise-num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .upper .exercise-num { background: var(--accent-light); color: var(--accent); }
  .lower .exercise-num { background: var(--accent2-light); color: var(--accent2); }

  .exercise-name {
    font-size: 15px;
    font-weight: 600;
    flex: 1;
    line-height: 1.2;
  }

  .exercise-tag {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 7px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    flex-shrink: 0;
  }

  .tag-compound { background: #E8F4FD; color: #2980B9; }
  .tag-isolation { background: #FEF9E7; color: #D4AC0D; }

  /* CARD BODY */
  .card-body {
    padding: 0 16px 16px;
    border-top: 1px solid var(--border);
  }

  /* WEIGHT LOG SECTION */
  .weight-section {
    padding-top: 14px;
  }

  .last-weight {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .last-weight strong {
    color: var(--text);
    font-size: 14px;
  }

  .weight-input-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .weight-input {
    flex: 1;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 16px;
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .weight-input:focus { border-color: var(--accent); }

  .weight-unit {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 600;
    min-width: 24px;
  }

  .log-btn {
    padding: 11px 18px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .upper .log-btn { background: var(--accent); color: white; }
  .lower .log-btn { background: var(--accent2); color: white; }
  .log-btn:active { transform: scale(0.97); opacity: 0.9; }

  .log-success {
    font-size: 12px;
    color: var(--accent);
    margin-top: 6px;
    font-weight: 500;
    min-height: 16px;
  }

  /* ACTION BUTTONS ROW */
  .action-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .action-btn {
    flex: 1;
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .action-btn:hover { background: var(--surface2); color: var(--text); }

  /* HISTORY PANEL */
  .history-panel {
    margin-top: 12px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 12px;
    display: none;
  }

  .history-panel.open { display: block; }

  .history-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 8px;
  }

  .history-empty {
    font-size: 13px;
    color: var(--text-muted);
    font-style: italic;
  }

  .history-entry {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .history-entry:last-child { border-bottom: none; }

  .history-date { color: var(--text-muted); }

  .history-weight {
    font-weight: 700;
    color: var(--text);
  }

  .history-delete {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
    line-height: 1;
  }

  .history-delete:hover { color: var(--danger); }

  /* INFO PANEL */
  .info-panel {
    margin-top: 12px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 14px;
    display: none;
  }

  .info-panel.open { display: block; }

  .info-section-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 6px;
    margin-top: 12px;
  }

  .info-section-title:first-child { margin-top: 0; }

  .info-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
  }

  .info-list {
    font-size: 13px;
    color: var(--text);
    line-height: 1.7;
    padding-left: 16px;
  }

  /* EMPTY STATE */
  .empty-day {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-day .emoji { font-size: 40px; margin-bottom: 12px; }
  .empty-day p { font-size: 15px; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: white;
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 13px;
    font-weight: 600;
    z-index: 999;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="app-title">Lift<span>Log</span></div>
      <div class="session-date" id="sessionDate"></div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active-upper" id="tabUpper" onclick="switchTab('upper')">🏋️ Upper</button>
    <button class="tab" id="tabLower" onclick="switchTab('lower')">🦵 Lower</button>
  </div>
</header>

<div class="content" id="mainContent"></div>
<div class="toast" id="toast"></div>

<script>
const EXERCISES = {
  upper: [
    {
      id: 'cable_chest_press',
      name: 'Cable Chest Press',
      tag: 'compound',
      form: 'Set the pulleys at chest height. Stand centered, stagger your stance for stability. Keep a slight forward lean, chest up, and drive the handles forward in a controlled arc — do not let the elbows flare beyond 90°. Squeeze at full extension, return slowly under control.',
      tips: 'This is your heaviest, most demanding exercise — treat it as your main push movement. Avoid rushing the eccentric (return) phase; that is where much of the stimulus comes from. If you feel it in your shoulders rather than your chest, lower the pulleys slightly.',
      variations: 'High-to-low cable fly (shifts emphasis to lower chest), single-arm cable press (improves side-to-side balance), incline angle (upper chest focus).'
    },
    {
      id: 'lat_pulldown',
      name: 'Lat Pulldown',
      tag: 'compound',
      form: 'Grip the bar slightly wider than shoulder-width, overhand. Sit tall with your chest up and a slight arch in the lower back. Initiate by depressing your shoulder blades (pull them down and back before bending your elbows). Pull to your upper chest, elbows tracking toward your hips. Return the bar slowly — a full stretch at the top is important.',
      tips: 'Many people let their upper traps take over — focus on initiating with the lats, not the arms. Think "elbows to hips" rather than "hands to chest." Avoid excessive backward lean, which turns this into a row.',
      variations: 'Close-grip (more bicep involvement), single-arm (better range of motion), neutral grip (easier on wrists and shoulders), behind-the-neck (generally not recommended — risk to cervical spine).'
    },
    {
      id: 'seated_cable_row',
      name: 'Seated Cable Row',
      tag: 'compound',
      form: 'Sit upright with a neutral spine — do not round your lower back. Pull the handle to your lower sternum, keeping your elbows close to your body at roughly 45°. Squeeze your shoulder blades together at the end of the row. Return with control, allowing a full stretch at the front without rounding forward.',
      tips: 'The row is about scapular retraction as much as arm pull. Avoid "cheating" by swinging your torso — the trunk should stay relatively still. A slight forward lean at the stretch and slight backward at the peak is acceptable, but keep it minimal.',
      variations: 'Wide-grip row (more upper back/rear delt), single-arm row (better range of motion and anti-rotation core work), high cable row (shifts emphasis to upper traps and rear delts).'
    },
    {
      id: 'overhead_press',
      name: 'Overhead Shoulder Press',
      tag: 'compound',
      form: 'Use a dumbbell or machine press. Start with the handles at shoulder height, palms forward or neutral. Press directly overhead, fully extending without locking out. Keep your core braced and avoid arching your lower back. Lower slowly to the start position.',
      tips: 'This comes after chest press and row, so your shoulders and triceps will already be partially fatigued — reduce the weight accordingly and prioritize form over load. Avoid pressing behind the head, which stresses the rotator cuff.',
      variations: 'Machine shoulder press (more stable, good for higher fatigue states), Arnold press (involves more rotation and rear delt), single-arm press (core stability challenge).'
    },
    {
      id: 'lateral_raise',
      name: 'Lateral Raise',
      tag: 'isolation',
      form: 'Hold dumbbells or cable handles at your sides, slight bend in the elbows. Raise your arms out to the sides until they reach shoulder height — no higher. Lead with your elbows, not your wrists. Lower slowly and with control; the eccentric phase matters here.',
      tips: 'Lighter is almost always better on lateral raises — this is a small isolation muscle. A very common error is using momentum to swing the weight up; slow, controlled reps are far more effective. Keep your traps relaxed — shrugging recruits the wrong muscles.',
      variations: 'Cable lateral raise (constant tension throughout the range), leaning lateral raise (better stretch at the bottom), single-arm (allows greater focus and range).'
    },
    {
      id: 'bicep_curl',
      name: 'Bicep Curl',
      tag: 'isolation',
      form: 'Stand with a neutral spine, elbows close to your sides and fixed — they should not swing forward. Curl the weight to shoulder height, fully supinating (rotating) your wrist at the top. Lower slowly and with control, reaching full extension at the bottom.',
      tips: 'Most of the work happens on the way down — a slow 3-second eccentric will produce far more growth than a fast drop. Avoid letting your elbows travel forward as the weight gets heavier; that recruits the front delts instead.',
      variations: 'Hammer curl (neutral grip, trains brachialis and forearms), incline dumbbell curl (greater stretch on the bicep), cable curl (constant tension), concentration curl (strict form, good for peak contraction).'
    },
    {
      id: 'tricep_pushdown',
      name: 'Cable Tricep Pushdown',
      tag: 'isolation',
      form: 'Stand close to the cable, elbows pinned at your sides at roughly 90°. Push the bar or rope down until your arms are fully extended. Squeeze the tricep at the bottom. Return slowly, stopping before your elbows travel forward.',
      tips: 'The key error is letting the elbows drift upward and forward on each rep, which turns it into a shoulder exercise. Keep elbows fixed at your sides throughout. With a rope attachment, spread the rope outward at the bottom for a stronger contraction.',
      variations: 'Rope pushdown (allows natural wrist rotation, hits lateral head more), overhead cable extension (long head emphasis, more stretch), single-arm (better isolation).'
    },
    {
      id: 'cable_fly',
      name: 'Cable Fly',
      tag: 'isolation',
      form: 'Set pulleys at shoulder height or slightly above. Stand in a split stance in the center. With a slight bend in the elbows (fixed throughout), bring the handles together in a wide arc, as if hugging a barrel. Squeeze the chest at the center. Return slowly in a controlled arc — the stretch is the most valuable part of this exercise.',
      tips: 'As a finisher, this is about feeling the stretch and contraction, not moving weight. Do not let the elbows bend more as the weight gets heavier — maintain the fixed angle and reduce the load instead. Focus on squeezing the pecs, not pulling with the arms.',
      variations: 'Low-to-high fly (upper chest), high-to-low fly (lower chest), single-arm (better range of motion and control).'
    }
  ],
  lower: [
    {
      id: 'hip_thrust',
      name: 'Hip Thrust',
      tag: 'compound',
      form: 'Sit against a bench with your shoulder blades on the edge, a barbell or pad across your hips. Plant your feet flat on the floor, hip-width apart. Drive through your heels to raise your hips, squeezing your glutes hard at the top — your body should form a straight line from knees to shoulders. Lower slowly and with control.',
      tips: 'This is your glute-dominant compound — treat it with the same seriousness as a squat. At the top, focus on a strong posterior pelvic tilt (tuck your pelvis under slightly) to fully contract the glutes. Avoid hyperextending your lower back at the top.',
      variations: 'Single-leg hip thrust (increases glute activation and corrects imbalances), banded hip thrust (adds resistance at the top where hip thrusts tend to get easier), feet-elevated (greater range of motion).'
    },
    {
      id: 'romanian_deadlift',
      name: 'Romanian Deadlift',
      tag: 'compound',
      form: 'Hold a barbell or dumbbells in front of your thighs. Hinge at the hips — push them back, not down — while maintaining a flat back and slight bend in the knees. Lower the weight along your legs until you feel a deep stretch in your hamstrings (roughly mid-shin level). Drive your hips forward to return to standing.',
      tips: 'Do this while fresh — it requires the most technical precision of your lower day exercises. The key distinction from a regular deadlift is that this is a hip hinge, not a squat. Keep the bar close to your body at all times. If your lower back rounds, you have gone too deep or the weight is too heavy.',
      variations: 'Single-leg RDL (significantly increases stability demand and hamstring isolation), stiff-leg deadlift (even less knee bend, more hamstring emphasis), dumbbell RDL (better for beginners learning the hinge pattern).'
    },
    {
      id: 'leg_press',
      name: 'Leg Press',
      tag: 'compound',
      form: 'Place your feet at shoulder-width on the platform. Lower the sled until your knees reach approximately 90° — do not let your lower back peel off the seat. Press through your full foot (not just toes) to extend your legs, stopping just short of full lockout to keep tension on the muscles.',
      tips: 'Foot position changes the emphasis: higher placement targets glutes and hamstrings more, lower placement targets quads more. Do not lock out your knees aggressively at the top, as this shifts load to the joint rather than the muscle.',
      variations: 'Single-leg press (addresses imbalances), narrow stance (more quad-dominant), wide stance (more glute/adductor), partial range at the bottom (overloading the stretched position).'
    },
    {
      id: 'hamstring_curl',
      name: 'Hamstring Curl',
      tag: 'isolation',
      form: 'Whether lying or seated, position the pad just above your heels. Curl the weight toward your glutes through a full range of motion. Squeeze at full contraction. Return slowly and under control — do not let the weight drop.',
      tips: 'The hamstrings are a two-joint muscle (crossing both the hip and knee), and the seated version keeps them under more tension in the stretched position, which may be more effective for hypertrophy. Either version works well — use whichever your gym has.',
      variations: 'Seated hamstring curl (better stretch), lying hamstring curl (more common), single-leg curl (addresses imbalances), Nordic curl (advanced bodyweight option — very effective for hamstring strength).'
    },
    {
      id: 'leg_extension',
      name: 'Leg Extension',
      tag: 'isolation',
      form: 'Sit with your back against the pad and the roller just above your ankles. Extend your legs fully, squeezing your quads hard at the top. Hold briefly, then lower slowly — taking at least 2–3 seconds on the way down.',
      tips: 'There has been some debate about knee safety with leg extensions, but at moderate loads and full range of motion, they are generally safe for healthy knees. If you experience knee discomfort, reduce the weight and avoid full lockout. Focus on the contraction, not the weight.',
      variations: 'Single-leg extension (better isolation), partial range (if knees are sensitive), terminal knee extension with band (lighter, functional alternative).'
    },
    {
      id: 'hip_abductor',
      name: 'Hip Abductor / Adductor',
      tag: 'isolation',
      form: 'Abductor: sit upright, push your legs outward against the pads. Adductor: push your legs inward. In both cases, move through a full range of motion and return slowly. Avoid using momentum — these are small muscles that respond best to controlled, deliberate movement.',
      tips: 'These are accessory exercises and do not need to be heavy. They target the gluteus medius (abductor) and inner thigh adductors — both important for hip stability, injury prevention, and glute development. High rep ranges (15–20) often work well here.',
      variations: 'Cable hip abduction (standing, targets glute medius more functionally), banded side steps (bodyweight abductor work), sumo squat (compound movement with strong adductor involvement).'
    },
    {
      id: 'calf_raise',
      name: 'Calf Raise',
      tag: 'isolation',
      form: 'Stand on the edge of a step or platform with your heels hanging off. Rise onto the balls of your feet as high as possible, squeezing the calves at the top. Lower slowly into a full stretch at the bottom — this deep stretch is essential for calf development.',
      tips: 'Calves respond well to both high and low rep ranges, but the most common mistake is not going through a full range of motion. A short, bouncy rep does almost nothing. Slow, deliberate reps with a pause at the bottom stretch and top contraction are far more effective.',
      variations: 'Seated calf raise (targets the soleus more, the deeper calf muscle), leg press calf raise, single-leg raise (greater load and range of motion), donkey calf raise.'
    }
  ]
};

let currentTab = 'upper';
let openInfo = {};
let openHistory = {};

function getStorage() {
  try { return JSON.parse(localStorage.getItem('liftlog_v2') || '{}'); }
  catch { return {}; }
}

function saveStorage(data) {
  localStorage.setItem('liftlog_v2', JSON.stringify(data));
}

function formatDate(isoString) {
  const d = new Date(isoString);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function todayString() {
  return new Date().toISOString().split('T')[0];
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabUpper').className = 'tab' + (tab === 'upper' ? ' active-upper' : '');
  document.getElementById('tabLower').className = 'tab' + (tab === 'lower' ? ' active-lower' : '');
  openInfo = {};
  openHistory = {};
  render();
}

function logWeight(exerciseId) {
  const input = document.getElementById('input_' + exerciseId);
  const val = parseFloat(input.value);
  if (isNaN(val) || val <= 0) {
    showToast('Enter a valid weight');
    return;
  }

  const data = getStorage();
  if (!data[exerciseId]) data[exerciseId] = [];

  const today = todayString();
  // Replace today's entry if it exists
  const existingIdx = data[exerciseId].findIndex(e => e.date === today);
  const entry = { date: today, weight: val };
  if (existingIdx >= 0) data[exerciseId][existingIdx] = entry;
  else data[exerciseId].unshift(entry);

  saveStorage(data);
  input.value = '';
  showToast('Logged ' + val + ' kg ✓');
  render();
}

function deleteEntry(exerciseId, date) {
  const data = getStorage();
  if (!data[exerciseId]) return;
  data[exerciseId] = data[exerciseId].filter(e => e.date !== date);
  saveStorage(data);
  render();
}

function toggleHistory(id) {
  openHistory[id] = !openHistory[id];
  render();
}

function toggleInfo(id) {
  openInfo[id] = !openInfo[id];
  render();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function getLastWeight(exerciseId) {
  const data = getStorage();
  const entries = data[exerciseId];
  if (!entries || entries.length === 0) return null;
  return entries[0];
}

function render() {
  const exercises = EXERCISES[currentTab];
  const color = currentTab;
  let html = '';

  exercises.forEach((ex, i) => {
    const last = getLastWeight(ex.id);
    const data = getStorage();
    const history = data[ex.id] || [];
    const isInfoOpen = openInfo[ex.id];
    const isHistOpen = openHistory[ex.id];
    const tagLabel = ex.tag === 'compound' ? 'Compound' : 'Isolation';
    const tagClass = ex.tag === 'compound' ? 'tag-compound' : 'tag-isolation';

    html += `
    <div class="exercise-card ${color}">
      <div class="card-header" onclick="toggleInfo('${ex.id}')">
        <div class="exercise-num">${i + 1}</div>
        <div class="exercise-name">${ex.name}</div>
        <span class="exercise-tag ${tagClass}">${tagLabel}</span>
      </div>
      <div class="card-body">
        <div class="weight-section">
          <div class="last-weight">
            ${last
              ? `Last logged: <strong>${last.weight} kg</strong> <span style="color:var(--text-muted)">(${formatDate(last.date)})</span>`
              : `<span style="font-style:italic">No weight logged yet</span>`
            }
          </div>
          <div class="weight-input-row">
            <input
              class="weight-input"
              id="input_${ex.id}"
              type="number"
              inputmode="decimal"
              step="0.5"
              min="0"
              placeholder="Weight today..."
              onkeydown="if(event.key==='Enter') logWeight('${ex.id}')"
            />
            <span class="weight-unit">kg</span>
            <button class="log-btn" onclick="logWeight('${ex.id}')">Log</button>
          </div>
        </div>

        <div class="action-row">
          <button class="action-btn" onclick="toggleHistory('${ex.id}')">
            ${isHistOpen ? '▲ Hide' : '📋 History'} ${history.length > 0 ? '(' + history.length + ')' : ''}
          </button>
          <button class="action-btn" onclick="toggleInfo('${ex.id}')">
            ${isInfoOpen ? '▲ Hide' : 'ℹ️ Form & Info'}
          </button>
        </div>

        ${isHistOpen ? `
        <div class="history-panel open">
          <div class="history-title">Weight History</div>
          ${history.length === 0
            ? '<div class="history-empty">No entries yet.</div>'
            : history.map(e => `
              <div class="history-entry">
                <span class="history-date">${formatDate(e.date)}</span>
                <span class="history-weight">${e.weight} kg</span>
                <button class="history-delete" onclick="deleteEntry('${ex.id}','${e.date}')" title="Delete">×</button>
              </div>
            `).join('')
          }
        </div>` : ''}

        ${isInfoOpen ? `
        <div class="info-panel open">
          <div class="info-section-title">Form Cues</div>
          <div class="info-text">${ex.form}</div>
          <div class="info-section-title">Tips</div>
          <div class="info-text">${ex.tips}</div>
          <div class="info-section-title">Variations</div>
          <div class="info-text">${ex.variations}</div>
        </div>` : ''}

      </div>
    </div>`;
  });

  document.getElementById('mainContent').innerHTML = html;

  // Set date
  const dateEl = document.getElementById('sessionDate');
  dateEl.textContent = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

render();
</script>
</body>
</html>
